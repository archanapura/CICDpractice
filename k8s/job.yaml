apiVersion: batch/v1
kind: Job
metadata:
  name: playwright-job
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      containers:
        - name: playwright
          image: archanapura/playwright-tests:latest
          env:
            - name: TEST_SUITE
              value: "@api"
          command: ["sh", "-c", "npx playwright test --grep $TEST_SUITE"]
      restartPolicy: Never