apiVersion: batch/v1
kind: Job
metadata:
  name: playwright-job
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      containers:
        - name: playwright
          image: archanapura/playwright-tests:latest
          env:
            - name: TEST_SUITE
              value: "@web"
          command: ["sh", "-c", "echo Running test && sleep 300"]
      restartPolicy: Never