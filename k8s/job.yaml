apiVersion: batch/v1
kind: Job
metadata:
  name: playwright-job
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      ttlSecondsAfterFinished: 60
      containers:
        - name: playwright
          image: archanapura/playwright-tests:latest
          env:
            - name: TEST_SUITE
              value: "@api"
          command: ["sh", "-c", "npx playwright test --grep $TEST_SUITE"]
      restartPolicy: Never