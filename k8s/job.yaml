apiVersion: batch/v1
kind: Job
metadata:
  name: playwright-job
spec:
  template:
    spec:
      containers:
        - name: playwright
          image: your-dockerhub/playwright-tests:latest
          env:
            - name: TEST_SUITE
              value: "@web"
          command: ["sh", "-c", "echo Running test && sleep 30"]
      restartPolicy: Never