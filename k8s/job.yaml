apiVersion: batch/v1
kind: Job
metadata:
  generateName: playwright-job-   # ✅ no fixed name
spec:
  template:
    metadata:
      labels:
        app: playwright           # ✅ required label
    spec:
      containers:
        - name: playwright
          image: your-dockerhub/playwright-tests:latest   # ✅ push image
          imagePullPolicy: Always
          env:
            - name: TEST_SUITE
              value: "@api"
      restartPolicy: Never